<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page Not Found — FitTrack Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="css/components.css"/>
  <link rel="stylesheet" href="css/responsive.css"/>
</head>
<body>
<div class="error-page">
  <div style="position:relative;z-index:1">
    <img src="https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=200&h=200&fit=crop&crop=center"
         style="width:100px;height:100px;border-radius:50%;object-fit:cover;margin:0 auto 16px;display:block;border:4px solid rgba(255,255,255,0.3);box-shadow:0 8px 32px rgba(0,0,0,0.3);animation:float 3s ease-in-out infinite" alt="FitTrack Pro"/>
    <div class="error-code animate-scaleIn">404</div>
    <h1 class="error-title animate-fadeInUp">Oops! Page Not Found</h1>
    <p class="error-desc animate-fadeInUp delay-1">Looks like this page skipped leg day and ran away. Let's get you back on track!</p>
    <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap" class="animate-fadeInUp delay-2">
      <a href="index.html" class="btn btn-primary btn-lg">🏠 Go Home</a>
      <a href="dashboard.html" class="btn btn-lg" style="background:rgba(255,255,255,0.15);color:white;border:2px solid rgba(255,255,255,0.3)">📊 Dashboard</a>
      <button class="btn btn-lg" style="background:rgba(255,255,255,0.15);color:white;border:2px solid rgba(255,255,255,0.3)" onclick="history.back()">← Go Back</button>
    </div>
    <div style="margin-top:48px;display:flex;gap:24px;justify-content:center;flex-wrap:wrap">
      <a href="workouts.html" style="color:rgba(255,255,255,0.6);font-size:0.875rem;transition:color 0.2s" onmouseover="this.style.color='white'" onmouseout="this.style.color='rgba(255,255,255,0.6)'">Workouts</a>
      <a href="nutrition.html" style="color:rgba(255,255,255,0.6);font-size:0.875rem;transition:color 0.2s" onmouseover="this.style.color='white'" onmouseout="this.style.color='rgba(255,255,255,0.6)'">Nutrition</a>
      <a href="goals.html" style="color:rgba(255,255,255,0.6);font-size:0.875rem;transition:color 0.2s" onmouseover="this.style.color='white'" onmouseout="this.style.color='rgba(255,255,255,0.6)'">Goals</a>
      <a href="challenges.html" style="color:rgba(255,255,255,0.6);font-size:0.875rem;transition:color 0.2s" onmouseover="this.style.color='white'" onmouseout="this.style.color='rgba(255,255,255,0.6)'">Challenges</a>
    </div>
  </div>
</div>
<script src="js/utils.js"></script>
<script src="js/app.js"></script>
</body>
</html>
